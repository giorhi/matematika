 <!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათემატიკის ეროვნული გამოცდების სავარჯიშო</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" integrity="sha512-9b7e7XscH6vGepH69Nco3mcrWAsf4E3XclvG86PzM2D6P2B2oO0fG28bEXpS7M805b5WwXFwE7I7N6A4vC6S6A==" crossorigin="anonymous" referrerpolicy="no-referrer" async></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 1.4rem;
            line-height: 1.5;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        @media (max-width: 500px) {
            .options-container { grid-template-columns: 1fr; }
        }
        .btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover:not(:disabled) {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        .btn:disabled { cursor: not-allowed; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #e74c3c; }
        
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .next-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .next-btn:hover { background-color: #34495e; }
        #feedback { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="question-box">
        <h2 id="question-text">აქ გამოჩნდება ამოცანა...</h2>
    </div>
    
    <div class="options-container" id="options-box">
        </div>
    
    <div class="controls">
        <div id="feedback"></div>
        <button class="next-btn" onclick="loadRandomQuestion()">შემდეგი ამოცანა ➔</button>
    </div>
</div>

<script>
    // აქ წერია თქვენი ამოცანების ბაზა
    const questionBank = [
        
  
        {
            question: "1. გამოთვალეთ: \( 3\frac{1}{3} \cdot (2\frac{3}{4} - 1,25) \)",
            options: ["ა) \( 2 \)", "ბ) \( 5 \)", "გ) \( -5 \)", "დ) \( \frac{7}{12} \)", "ე) \( \frac{21}{4} \)"],
            correct: "ბ) \( 5 \)"
        },
        {
            question: "2. იპოვეთ 2025-ის ყველა განსხვავებული მარტივი გამყოფის ჯამი.",
            options: ["ა) 3", "ბ) 5", "გ) 7", "დ) 8", "ე) 9"],
            correct: "დ) 8"
        }
    ];
   

    

    let currentQuestion = null;

    function loadRandomQuestion() {
        document.getElementById('feedback').innerText = '';
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';

        const randomIndex = Math.floor(Math.random() * questionBank.length);
        currentQuestion = questionBank[randomIndex];

        document.getElementById('question-text').innerHTML = currentQuestion.question;

        currentQuestion.options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerHTML = option;
            button.onclick = () => checkAnswer(button, option);
            optionsBox.appendChild(button);
        });

        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function checkAnswer(selectedButton, selectedOption) {
        const buttons = document.querySelectorAll('.options-container .btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selectedOption === currentQuestion.correct) {
            selectedButton.classList.add('correct');
            document.getElementById('feedback').innerHTML = "<span style='color: #2ecc71;'>სწორია! 🎉</span>";
        } else {
            selectedButton.classList.add('wrong');
            document.getElementById('feedback').innerHTML = "<span style='color: #e74c3c;'>არასწორია ➔</span>";
            
            buttons.forEach(btn => {
                if (btn.innerHTML === currentQuestion.correct) {
                    btn.classList.add('correct');
                }
            });
        }
    }

    window.onload = loadRandomQuestion;
</script>

</body>
</html>
