<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათემატიკის ტესტი</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #e7e7e7;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: background 0.2s;
        }
        .option-btn:hover {
            background-color: #ddd;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz">
        <h2 id="question">კითხვა ჩაიტვირთება...</h2>
        <div id="options"></div>
        <div id="result" class="result"></div>
    </div>
</div>

<script>
    // თქვენი ამოცანების ბაზა
    const questionBank = [
        {
            question: "1. გამოთვალეთ: \\( 3\\frac{1}{3} \\cdot (2\\frac{3}{4} - 1,25) \\)",
            options: ["ა) \\( 2 \\)", "ბ) \\( 5 \\)", "გ) \\( -5 \\)", "დ) \\( \\frac{7}{12} \\)", "ე) \\( \\frac{21}{4} \\)"],
            correct: "ბ) \\( 5 \\)"
        },
        {
            question: "2. იპოვეთ 2025-ის ყველა განსხვავებული მარტივი გამყოფის ჯამი.",
            options: ["ა) 3", "ბ) 5", "გ) 7", "დ) 8", "ე) 9"],
            correct: "დ) 8"
        }
    ];

    let currentQuestionIndex = 0;

    function loadQuestion() {
        const currentQuestion = questionBank[currentQuestionIndex];
        document.getElementById("question").innerHTML = currentQuestion.question;
        
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";
        document.getElementById("result").innerHTML = "";

        currentQuestion.options.forEach(option => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.innerHTML = option;
            button.onclick = () => checkAnswer(option);
            optionsContainer.appendChild(button);
        });

        // ეს კოდი აიძულებს საიტს, ყოველ ახალ კითხვაზე ხელახლა გადათარგმნოს სიმბოლოები ლამაზ წილადებად
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function checkAnswer(selectedOption) {
        const currentQuestion = questionBank[currentQuestionIndex];
        const resultDiv = document.getElementById("result");

        if (selectedOption === currentQuestion.correct) {
            resultDiv.innerHTML = "<span style='color: green;'>სწორია! 🎉</span>";
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questionBank.length) {
                    loadQuestion();
                } else {
                    document.getElementById("quiz").innerHTML = "<h2>ტესტი დასრულდა! ყოჩაღ! 🌟</h2>";
                }
            }, 1500);
        } else {
            resultDiv.innerHTML = "<span style='color: red;'>არასწორია, სცადე თავიდან! ❌</span>";
        }
    }

    // ტესტის გაშვება
    loadQuestion();
</script>

</body>
</html>
